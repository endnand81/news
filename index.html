<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>뉴스 브리핑</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
}

.header {
  padding: 15px;
  font-size: 20px;
  background: #000;
}

.slider {
  position: relative;
  width: 100%;
  height: 80vh;
  overflow: hidden;
}

.slide {
  display: none;
  width: 100%;
  height: 100%;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.active {
  display: block;
}

.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  cursor: pointer;
  color: white;
}

.prev { left: 10px; }
.next { right: 10px; }
</style>

</head>

<body>

<div class="header">뉴스 브리핑</div>

<div class="slider">

  <!-- 핵심: /news/ 경로 반드시 포함 -->
  <div class="slide active"><img src="/news/01.png"></div>
  <div class="slide"><img src="/news/02.png"></div>
  <div class="slide"><img src="/news/03.png"></div>
  <div class="slide"><img src="/news/04.png"></div>
  <div class="slide"><img src="/news/05.png"></div>
  <div class="slide"><img src="/news/06.png"></div>

  <div class="btn prev" onclick="prevSlide()">❮</div>
  <div class="btn next" onclick="nextSlide()">❯</div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide(){
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide(){
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}
</script>

</body>

</html>
